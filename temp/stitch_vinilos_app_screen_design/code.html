<!DOCTYPE html>

<html class="light" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;family=Manrope:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "surface-variant": "#dde4e5",
                    "on-primary-fixed": "#403f3f",
                    "surface-container-highest": "#dde4e5",
                    "error-dim": "#4e0309",
                    "on-secondary": "#fbf8f8",
                    "on-secondary-fixed": "#3f3f3f",
                    "primary-fixed": "#e5e2e1",
                    "on-tertiary-fixed": "#484a4a",
                    "tertiary-fixed": "#f4f3f3",
                    "on-primary-container": "#525151",
                    "secondary-fixed-dim": "#d6d4d3",
                    "error-container": "#fe8983",
                    "on-primary-fixed-variant": "#5c5b5b",
                    "background": "#f9f9f9",
                    "primary": "#5f5e5e",
                    "outline": "#757c7d",
                    "surface": "#f9f9f9",
                    "on-background": "#2d3435",
                    "primary-fixed-dim": "#d7d4d3",
                    "surface-dim": "#d4dbdd",
                    "error": "#9f403d",
                    "on-error": "#fff7f6",
                    "on-tertiary-fixed-variant": "#656666",
                    "inverse-primary": "#ffffff",
                    "tertiary-dim": "#525354",
                    "surface-container-high": "#e4e9ea",
                    "surface-tint": "#5f5e5e",
                    "inverse-on-surface": "#9c9d9d",
                    "secondary-fixed": "#e4e2e1",
                    "on-secondary-container": "#525251",
                    "on-surface": "#2d3435",
                    "tertiary": "#5e5f5f",
                    "on-tertiary": "#f9f9f9",
                    "on-surface-variant": "#5a6061",
                    "primary-container": "#e5e2e1",
                    "on-tertiary-container": "#5a5c5c",
                    "on-error-container": "#752121",
                    "secondary-container": "#e4e2e1",
                    "on-secondary-fixed-variant": "#5c5b5b",
                    "surface-container": "#ebeeef",
                    "tertiary-fixed-dim": "#e5e5e5",
                    "outline-variant": "#adb3b4",
                    "surface-container-lowest": "#ffffff",
                    "surface-bright": "#f9f9f9",
                    "primary-dim": "#535252",
                    "tertiary-container": "#f4f3f3",
                    "on-primary": "#faf7f6",
                    "surface-container-low": "#f2f4f4",
                    "secondary-dim": "#535353",
                    "inverse-surface": "#0c0f0f"
            },
            "borderRadius": {
                    "DEFAULT": "0.125rem",
                    "lg": "0.25rem",
                    "xl": "0.5rem",
                    "full": "0.75rem"
            },
            "fontFamily": {
                    "headline": ["Space Grotesk"],
                    "body": ["Manrope"],
                    "label": ["Manrope"]
            }
          },
        },
      }
    </script>
<style>
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      .satin-finish {
        background: linear-gradient(to bottom, #5f5e5e, #535252);
      }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background font-body text-on-background min-h-screen pb-32">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-white/80 dark:bg-stone-950/80 backdrop-blur-md shadow-[0_8px_24px_rgba(0,0,0,0.04)]">
<div class="flex items-center px-4 h-16 w-full">
<button class="p-2 -ml-2 rounded-full hover:bg-stone-100 transition-colors active:scale-95 duration-200">
<span class="material-symbols-outlined text-stone-800 dark:text-stone-100">arrow_back</span>
</button>
<h1 class="ml-2 font-headline tracking-tight font-bold text-lg text-stone-800 dark:text-stone-100">Agregar Track</h1>
</div>
</header>
<main class="pt-20 px-6 max-w-md mx-auto">
<!-- Album Context Section (Read-only) -->
<section class="mb-10">
<div class="bg-surface-container-low p-4 rounded-xl flex items-center gap-4">
<div class="w-16 h-16 rounded-lg overflow-hidden shadow-sm flex-shrink-0">
<img alt="Album Cover" class="w-full h-full object-cover" data-alt="Minimalist high-contrast studio shot of a classic black vinyl record sleeve with iconic helmet design, luxury aesthetic" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBojqDkrNYGgVxxjThZR7mdmJ7Gl3Lx4Usgua5sXUpYNTJpajP0KzCwSwCoDSTkeyucJnYRjYNSTeIJ_AZ-uKuF657v-r59afremuMH-W4CcXxRrD-E2g2NckWNFpBcvF3cgV9bqEUA_Ve6qXyuhYNttf_XJ7BwIVjv-UKIXxf-T7VTdsgFQSTZ-fUlCOk0RDFGtT1KlPXervGl-ixKD6a81hy9kI_ueUqIblAKfd_4Vzq5jRl2_JYTY1QLUZCntB0-VNKQ6di7oJY"/>
</div>
<div class="flex flex-col">
<span class="font-headline font-bold text-on-surface leading-tight">Random Access Memories</span>
<span class="text-on-surface-variant text-sm font-medium">Daft Punk</span>
</div>
</div>
</section>
<!-- Nuevo Track Form Section -->
<section class="mb-10">
<h2 class="font-headline text-lg font-bold mb-6 tracking-tight">Nuevo Track</h2>
<div class="space-y-6">
<!-- Input Name -->
<div class="relative">
<input class="peer block w-full px-4 py-4 bg-surface-container-lowest border-0 ring-1 ring-outline-variant/30 focus:ring-2 focus:ring-primary rounded-lg font-body placeholder-transparent outline-none transition-all" id="track_name" name="track_name" placeholder="Nombre del track" type="text"/>
<label class="absolute left-4 -top-2.5 px-1 bg-surface text-xs font-label uppercase tracking-widest text-on-surface-variant transition-all peer-placeholder-shown:text-base peer-placeholder-shown:top-4 peer-placeholder-shown:bg-transparent peer-focus:-top-2.5 peer-focus:text-xs peer-focus:bg-surface peer-focus:text-primary" for="track_name">
                        Nombre del track
                    </label>
</div>
<!-- Input Duration -->
<div class="relative">
<input class="peer block w-full px-4 py-4 bg-surface-container-lowest border-0 ring-1 ring-outline-variant/30 focus:ring-2 focus:ring-primary rounded-lg font-body placeholder-on-surface-variant/40 outline-none transition-all" id="duration" name="duration" placeholder="mm:ss" type="text"/>
<label class="absolute left-4 -top-2.5 px-1 bg-surface text-xs font-label uppercase tracking-widest text-on-surface-variant transition-all peer-placeholder-shown:text-base peer-placeholder-shown:top-4 peer-placeholder-shown:bg-transparent peer-focus:-top-2.5 peer-focus:text-xs peer-focus:bg-surface peer-focus:text-primary" for="duration">
                        Duración
                    </label>
</div>
<button class="w-full py-4 satin-finish text-on-primary font-headline font-bold rounded-lg active:scale-[0.98] transition-transform">
                    Agregar Track
                </button>
</div>
</section>
<!-- Tonal Shift Divider -->
<div class="h-px w-full bg-surface-container-high mb-10"></div>
<!-- Tracks agregados Section -->
<section class="mb-12">
<h2 class="font-headline text-lg font-bold mb-6 tracking-tight">Tracks agregados</h2>
<div class="space-y-4">
<!-- Track Item 1 -->
<div class="flex items-center justify-between p-4 rounded-lg hover:bg-surface-container-low transition-colors group">
<div class="flex items-center gap-4">
<span class="font-label text-xs text-outline-variant">01</span>
<div class="flex flex-col">
<span class="font-body font-semibold text-on-surface">Give Life Back to Music</span>
<span class="text-on-surface-variant text-sm">4:34</span>
</div>
</div>
<button class="w-10 h-10 flex items-center justify-center rounded-full text-on-surface-variant hover:text-error hover:bg-error/5 transition-all">
<span class="material-symbols-outlined text-xl">delete</span>
</button>
</div>
<!-- Track Item 2 -->
<div class="flex items-center justify-between p-4 rounded-lg hover:bg-surface-container-low transition-colors group">
<div class="flex items-center gap-4">
<span class="font-label text-xs text-outline-variant">02</span>
<div class="flex flex-col">
<span class="font-body font-semibold text-on-surface">The Game of Love</span>
<span class="text-on-surface-variant text-sm">5:22</span>
</div>
</div>
<button class="w-10 h-10 flex items-center justify-center rounded-full text-on-surface-variant hover:text-error hover:bg-error/5 transition-all">
<span class="material-symbols-outlined text-xl">delete</span>
</button>
</div>
</div>
</section>
</main>
<!-- Footer Fixed Button -->
<div class="fixed bottom-0 left-0 w-full p-6 bg-gradient-to-t from-background via-background/90 to-transparent">
<div class="max-w-md mx-auto">
<button class="w-full py-4 satin-finish text-on-primary font-headline font-bold rounded-lg shadow-lg active:scale-[0.98] transition-transform">
                Guardar cambios
            </button>
</div>
</div>
</body></html>
